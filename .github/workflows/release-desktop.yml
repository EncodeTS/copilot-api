name: Release Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# macOS .dmg builds (arm64 + x64) are produced by the local release script on
# the maintainer's Mac, which creates the GitHub Release and uploads the dmg
# assets. CI is responsible only for the Windows installer, which cannot be
# built reliably on an Apple Silicon Mac (it needs Wine + x64 emulation).
jobs:
  # ─── Windows ─────────────────────────────────────────────────────────────
  build-win:
    name: Build & publish Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Build server
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Windows package
        working-directory: desktop
        run: npm run package:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Stage installer with friendly name + checksum
        working-directory: desktop
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          base="Copilot-API-${tag}-windows-x64"
          mkdir -p upload
          exe=$(ls release/*.exe | head -n1)
          cp "$exe" "upload/${base}.exe"
          ( cd upload && sha256sum "${base}.exe" > "${base}.sha256.txt" )
          ls -la upload

      - name: Upload Windows installer to the GitHub Release
        working-directory: desktop
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ github.ref_name }}"
          base="Copilot-API-${tag}-windows-x64"

          # The Release is created by the macOS release script; wait for it so
          # this upload doesn't fail on a race when CI finishes first.
          for i in {1..12}; do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Release $tag exists, uploading."
              break
            fi
            echo "Release not found yet, waiting 30s... ($i/12)"
            sleep 30
          done

          # Single explicit upload (no `find -exec`, which hides a failing
          # upload behind find's exit code). With pipefail + errexit a failed
          # upload now fails the job loudly instead of silently dropping the exe.
          gh release upload "$tag" \
            "upload/${base}.exe" \
            "upload/${base}.sha256.txt" \
            --clobber
