name: Release Desktop

on:
  push:
    tags:
      - "v*"
  # Allow re-publishing the desktop assets for an existing tag by hand
  # (e.g. to rebuild a release). Provide the tag to build against.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build & publish (e.g. v1.10.32-r1)"
        required: true
        type: string

permissions:
  contents: write

# Everything (macOS arm64 + x64 dmg, Windows x64 exe) is built and published by
# CI. macOS builds run on architecture-matched runners so native runtime
# dependencies such as sharp are installed for the same architecture that will
# ship in the app. All assets use the friendly naming convention
# Copilot-API-<tag>-<arch>.<ext> with matching .blockmap / .sha256.txt.
jobs:
  # ─── macOS (arm64 + x64) ─────────────────────────────────────────────────
  build-mac:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x64
            runner: macos-15-intel
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Build server
        run: bun run build

      - uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          package-manager-cache: false

      - name: Install desktop dependencies
        working-directory: desktop
        run: bun install --frozen-lockfile

      - name: Build macOS ${{ matrix.arch }} package
        working-directory: desktop
        run: bun run package:mac -- --${{ matrix.arch }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Stage dmg with friendly name + checksum
        working-directory: desktop
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          arch="${{ matrix.arch }}"
          base="Copilot-API-${tag}-${arch}"
          mkdir -p upload
          dmg=$(ls release/*.dmg | head -n1)
          cp "$dmg" "upload/${base}.dmg"
          if ls release/*.dmg.blockmap >/dev/null 2>&1; then
            cp "$(ls release/*.dmg.blockmap | head -n1)" "upload/${base}.dmg.blockmap"
          fi
          ( cd upload && sha256sum ${base}.dmg ${base}.dmg.blockmap 2>/dev/null > "${base}.sha256.txt" )
          ls -la upload

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-mac-${{ matrix.arch }}
          path: desktop/upload/*
          if-no-files-found: error

  # ─── Windows (x64) ───────────────────────────────────────────────────────
  build-win:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Build server
        run: bun run build

      - uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          package-manager-cache: false

      - name: Install desktop dependencies
        working-directory: desktop
        run: bun install --frozen-lockfile

      - name: Build Windows package
        working-directory: desktop
        run: bun run package:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Stage installer with friendly name + checksum
        working-directory: desktop
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          base="Copilot-API-${tag}-windows-x64"
          mkdir -p upload
          exe=$(ls release/*.exe | head -n1)
          cp "$exe" "upload/${base}.exe"
          ( cd upload && sha256sum "${base}.exe" > "${base}.sha256.txt" )
          ls -la upload

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-win
          path: desktop/upload/*
          if-no-files-found: error

  # ─── Publish all assets to the GitHub Release ────────────────────────────
  publish:
    name: Publish to GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-assets
          merge-multiple: true

      - name: List assets
        run: find dist-assets -type f | sort

      - name: Upload assets to the GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"

          # Ensure the release exists. If it was already created (e.g. by the
          # changelog workflow or by hand) we keep its notes untouched and only
          # attach assets; otherwise create a minimal release with auto notes.
          if ! gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag not found — creating it."
            release_flags=()
            if [[ "$tag" == *"-"* ]]; then
              release_flags+=(--prerelease)
            fi
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              --verify-tag \
              "${release_flags[@]}"
          else
            echo "Release $tag exists — keeping its notes, attaching assets."
          fi

          # Single explicit upload; --clobber replaces same-named assets in
          # place. With pipefail + errexit any failed upload fails the job.
          gh release upload "$tag" dist-assets/* --clobber
