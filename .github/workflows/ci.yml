name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"

      - name: Verify Node sqlite support
        run: node -e "import('node:sqlite').then(() => console.log('node:sqlite ok')).catch((error) => { console.error(error); process.exit(1) })"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint:all

      - name: Run type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

  windows-codex:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Codex model discovery tests
        run: bun test tests/codex-installed-catalog.test.ts tests/codex-client-models.test.ts tests/codex-version.test.ts tests/models-route.test.ts tests/responses-capabilities.test.ts

      - name: Run type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Build desktop server
        run: bun run build:desktop
