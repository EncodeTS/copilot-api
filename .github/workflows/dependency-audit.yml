name: Dependency audit

on:
  push:
    branches: ["master", "dev"]
    paths:
      - ".github/workflows/dependency-audit.yml"
      - "bun.lock"
      - "desktop/bun.lock"
      - "desktop/package.json"
      - "package.json"
  pull_request:
    paths:
      - ".github/workflows/dependency-audit.yml"
      - "bun.lock"
      - "desktop/bun.lock"
      - "desktop/package.json"
      - "package.json"
  schedule:
    - cron: "23 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production:
    name: Production high-severity audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install frozen dependency graph
        run: bun install --frozen-lockfile

      - name: Install frozen Desktop dependency graph
        working-directory: desktop
        run: bun install --frozen-lockfile

      - name: Reject high or critical production advisories
        run: bun run audit:production

      - name: Reject Desktop high or critical production advisories
        working-directory: desktop
        run: bun audit --production --audit-level=high
